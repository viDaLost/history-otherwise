<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Иная История</title>
  <meta name="description" content="Мобильный симулятор альтернативной истории на Gemini API." />
  <meta name="theme-color" content="#07111f" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="bg-grid"></div>

  <main class="app">
    <header class="topbar">
      <div>
        <span class="mini-label">AI history lab</span>
        <h1>Иная История</h1>
      </div>
      <button class="icon-btn" id="historyToggle" type="button" aria-label="История">↻</button>
    </header>

    <section class="composer" id="composer">
      <div class="composer-head">
        <div>
          <span class="mini-label">Новый сценарий</span>
          <h2>Что изменить?</h2>
        </div>
        <button class="ghost-btn" id="fillExample" type="button">Пример</button>
      </div>

      <form id="historyForm" class="form">
        <div class="field">
          <label for="eventTitle">Событие</label>
          <input id="eventTitle" name="eventTitle" type="text" placeholder="Вторая мировая" autocomplete="off" />
        </div>

        <div class="quick-grid">
          <div class="field">
            <label for="region">Регион</label>
            <input id="region" name="region" type="text" placeholder="Европа" autocomplete="off" />
          </div>

          <div class="field">
            <label for="period">Период</label>
            <input id="period" name="period" type="text" placeholder="1939 год" autocomplete="off" />
          </div>
        </div>

        <div class="field">
          <label for="change">Главное изменение</label>
          <textarea id="change" name="change" rows="4" placeholder="Вторая мировая война не началась, потому что Германия столкнулась с внутренним военным заговором."></textarea>
        </div>

        <details class="advanced">
          <summary>Настройки ответа</summary>
          <div class="quick-grid">
            <div class="field">
              <label for="depth">Глубина</label>
              <select id="depth" name="depth">
                <option>Короткий анализ</option>
                <option selected>Средний анализ</option>
                <option>Глубокий анализ</option>
              </select>
            </div>

            <div class="field">
              <label for="style">Стиль</label>
              <select id="style" name="style">
                <option selected>Документальный</option>
                <option>Научно-исторический</option>
                <option>Драматичный</option>
                <option>Сценарий для видео</option>
              </select>
            </div>
          </div>
        </details>

        <button class="main-btn" id="submitBtn" type="submit">
          <span>Смоделировать</span>
          <small>Gemini API</small>
        </button>
      </form>
    </section>

    <section class="loading-card hidden" id="loadingCard">
      <div class="progress-shell">
        <div class="progress-top">
          <div>
            <h3 id="loadingTitle">Строю ветку истории</h3>
            <p id="loadingText">Подготовка запроса.</p>
          </div>
          <strong id="progressPercent">0%</strong>
        </div>

        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="progress-meta">
          <span id="progressStage">Старт</span>
          <span id="progressTime">Осталось: 20 сек.</span>
        </div>
      </div>
    </section>

    <section class="error-card hidden" id="errorBox"></section>

    <section class="result-shell hidden" id="resultShell">
      <div class="result-hero">
        <div class="score-ring">
          <strong id="scoreValue">0</strong>
          <span>из 100</span>
        </div>
        <div>
          <span class="mini-label">Альтернативная ветка</span>
          <h2 id="resultTitle">Результат</h2>
          <p id="resultSummary">Здесь появится краткое резюме.</p>
        </div>
      </div>

      <nav class="tabs" id="tabs">
        <button class="tab active" type="button" data-tab="overview">Обзор</button>
        <button class="tab" type="button" data-tab="analysis">Анализ</button>
        <button class="tab" type="button" data-tab="timeline">Линия</button>
        <button class="tab" type="button" data-tab="map">Карта</button>
        <button class="tab" type="button" data-tab="export">Экспорт</button>
      </nav>

      <div class="tab-content" id="tabContent"></div>
    </section>

    <section class="history-panel hidden" id="historyPanel">
      <div class="composer-head">
        <div>
          <span class="mini-label">Память браузера</span>
          <h2>История</h2>
        </div>
        <button class="ghost-btn" id="clearHistory" type="button">Очистить</button>
      </div>
      <div id="historyList" class="history-list"></div>
    </section>
  </main>

  <div class="toast hidden" id="toast"></div>

  <script src="/app.js"></script>
</body>
</html>
